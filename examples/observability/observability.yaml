# Full observability configuration with custom metric settings for all 7 histogram families

management_server:
  enabled: true
  port: 8080

  health:
    enabled: true
    liveness_path: /healthz
    readiness_path: /readyz
    startup_path: /startup
    readiness_check_period_seconds: 5
    startup_check_period_seconds: 5

  observability:
    enabled: true
    path: /metrics
    metric_prefix: sam

    # Distribution metrics (histograms)
    distribution_metrics:
      outbound.request.duration:
        buckets: [0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0]  # Custom buckets for remote calls
        exclude_labels: []  # No exclusions

      gen_ai.client.operation.duration:
        buckets: [1.0, 5.0, 10.0, 30.0, 60.0]  # Simpler buckets for LLM calls
        exclude_labels: []  # Include tokens dimension (higher cardinality)

      gen_ai.client.operation.ttft.duration:
        buckets: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]  # Custom TTFT buckets
        exclude_labels: []

      db.duration:
        buckets: [0.001, 0.01, 0.1, 0.5, 1.0]  # Fast DB operations
        exclude_labels: [db.operation.name]  # Only track by collection, not operation

      gateway.duration:
        buckets: [0.01, 0.1, 0.5, 1.0, 5.0, 10.0, 30.0]  # Gateway latency buckets
        exclude_labels: []

      gateway.ttfb.duration:
        exclude_labels: ['*']  # Disabled - not tracking TTFB in this deployment

      operation.duration:
        buckets: [0.1, 0.5, 1.0, 5.0, 10.0, 30.0]  # Internal operations
        exclude_labels: [type]  # Don't track by component type

    # Value metrics (counters and gauges)
    value_metrics:
      gateway.events.processed:
        exclude_labels: [verbose_detail]  # Example counter with filtered labels

      broker.active.connections:
        exclude_labels: [detail_label]  # Example gauge with filtered labels

# Test app
apps:
  - name: observability_test
    flows:
      - name: test_flow
        components:
          - component_name: input
            component_module: stdin_input

          - component_name: output
            component_module: stdout_output